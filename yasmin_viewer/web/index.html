<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YASMIN Viewer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div class="title-group">
          <h1>YASMIN Viewer</h1>
          <span id="status-badge" class="status-badge status-connecting">Connecting</span>
        </div>

        <div class="toolbar">
          <label class="toolbar-field">
            <span>FSM</span>
            <select id="fsm-select"></select>
          </label>

          <label class="toolbar-field checkbox-field">
            <input id="hide-nested" type="checkbox" />
            <span>Hide Nested FSMs</span>
          </label>

          <label class="toolbar-field checkbox-field">
            <input id="show-active" type="checkbox" />
            <span>Show Only Active FSMs</span>
          </label>

          <button id="refresh-button" type="button" class="toolbar-button">
            Refresh
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section id="empty-state" class="empty-state">
        Waiting for state machines on <code>/fsm_viewer</code>
      </section>

      <section id="viewer-panel" class="viewer-panel hidden">
        <div class="viewer-header">
          <div>
            <h2 id="viewer-title">FSMs</h2>
            <div id="viewer-subtitle" class="viewer-subtitle"></div>
          </div>
        </div>

        <div id="diagram-list" class="diagram-list"></div>
      </section>
    </main>

    <script src="/mermaid.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
